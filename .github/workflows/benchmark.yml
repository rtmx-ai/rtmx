name: Benchmarks

on:
  schedule:
    - cron: '0 4 * * *'  # 04:00 UTC daily
  workflow_dispatch: {}
  # REQ-BENCH-016: PR-level smoke benchmark on relevant paths
  pull_request:
    paths:
      - 'benchmarks/**'
      - 'internal/cmd/from_tests*'
      - 'internal/cmd/from_go*'
      - 'pkg/rtmx/**'

permissions:
  contents: read
  issues: write

jobs:
  benchmark:
    strategy:
      fail-fast: false
      matrix:
        language: [go, python, rust, javascript, java, csharp, tak-server]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - name: Build rtmx
        run: make build

      - name: Run benchmark
        run: make -C benchmarks run LANG=${{ matrix.language }}

      - name: Compare to baseline
        run: make -C benchmarks compare LANG=${{ matrix.language }}

      - name: Write step summary
        if: always()
        run: |
          LANG="${{ matrix.language }}"
          RESULT="benchmarks/results/${LANG}.json"
          if [ -f "$RESULT" ]; then
            MARKERS=$(jq '.markers_found // 0' "$RESULT")
            PASSED=$(jq '.tests_passed // 0' "$RESULT")
            FAILED=$(jq '.tests_failed // 0' "$RESULT")
            STATUS=$(jq -r '.verify_status // "unknown"' "$RESULT")
            echo "## Benchmark: ${LANG}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Markers found | ${MARKERS} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Tests passed | ${PASSED} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Tests failed | ${FAILED} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Verify status | ${STATUS} |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Benchmark: ${LANG}" >> "$GITHUB_STEP_SUMMARY"
            echo "No results file found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: benchmark-${{ matrix.language }}
          path: benchmarks/results/
          retention-days: 90

      # REQ-BENCH-017: Distinguish infra failure from benchmark regression
      - name: Classify failure
        id: classify
        if: failure()
        run: |
          LANG="${{ matrix.language }}"
          RESULT="benchmarks/results/${LANG}.json"
          if [ -f "$RESULT" ]; then
            echo "type=regression" >> "$GITHUB_OUTPUT"
          else
            echo "type=infra" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const lang = '${{ matrix.language }}';
            const failType = '${{ steps.classify.outputs.type }}';
            const isInfra = failType === 'infra';
            const title = isInfra
              ? `Benchmark infra failure: ${lang}`
              : `Benchmark regression: ${lang}`;
            const labels = isInfra
              ? ['benchmark', 'infra']
              : ['benchmark', 'regression'];
            const body = [
              `**Type:** ${isInfra ? 'Infrastructure failure' : 'Benchmark regression'}`,
              `**Language:** ${lang}`,
              `**Run:** [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              '',
              isInfra
                ? 'No results file was produced. Likely a clone, build, or network failure.'
                : 'Results file exists but comparison to baseline detected a regression.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels,
            });
