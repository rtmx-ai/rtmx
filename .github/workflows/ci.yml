name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'  # Weekly Monday 9am UTC

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.25']
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Test
        shell: bash
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.out
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - uses: github/codeql-action/init@v3
        with:
          languages: go

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3

  marker-compliance:
    name: Marker Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Check marker compliance
        shell: bash
        run: |
          TOTAL=$(grep -r 'func Test' internal/ test/ pkg/ --include='*_test.go' -l | wc -l)
          MARKED=$(grep -r 'rtmx\.Req(t,' internal/ test/ pkg/ --include='*_test.go' -l | wc -l)
          if [ "$TOTAL" -eq 0 ]; then
            echo "No test files found"
            exit 1
          fi
          PCT=$((MARKED * 100 / TOTAL))
          echo "Test files with rtmx.Req markers: ${MARKED}/${TOTAL} (${PCT}%)"
          THRESHOLD=80
          if [ "$PCT" -lt "$THRESHOLD" ]; then
            echo "::error::Marker compliance ${PCT}% is below ${THRESHOLD}% threshold"
            exit 1
          fi
          echo "Marker compliance: ${PCT}% (threshold: 80%)"

  verify-requirements:
    name: Verify Requirements
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
        continue-on-error: true

      - uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build
        run: go build -o rtmx ./cmd/rtmx

      - name: Verify requirements
        run: ./rtmx verify --update --verbose

      - name: Show status
        run: ./rtmx status

      - name: Commit RTM updates
        run: |
          git diff --quiet .rtmx/database.csv && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .rtmx/database.csv
          git commit -m "ci: Auto-update RTM status from test results"
          git push

  smoke-test:
    name: Smoke Test
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build binary
        run: go build -o rtmx ./cmd/rtmx

      - name: Smoke test core commands
        run: |
          set -e
          echo "=== version ==="
          ./rtmx version

          echo "=== status ==="
          ./rtmx status

          echo "=== status --json ==="
          ./rtmx status --json | jq .total

          echo "=== status --fail-under ==="
          ./rtmx status --fail-under 50

          echo "=== backlog ==="
          ./rtmx backlog | head -20

          echo "=== backlog --json ==="
          ./rtmx backlog --json | jq .total_missing

          echo "=== health ==="
          ./rtmx health

          echo "=== health --json ==="
          ./rtmx health --json | jq .status

          echo "=== deps ==="
          ./rtmx deps | head -20

          echo "=== cycles ==="
          ./rtmx cycles

          echo "=== reconcile ==="
          ./rtmx reconcile

          echo "=== context ==="
          ./rtmx context

          echo "=== install --agents --list ==="
          ./rtmx install --agents --list

          echo "All smoke tests passed."

  cross-language-e2e:
    name: Cross-Language E2E
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Go CLI
        run: go build -o rtmx ./cmd/rtmx

      - name: Install Python rtmx
        run: pip install rtmx

      - name: Create test file
        run: |
          cat > /tmp/test_cross.py << 'PYEOF'
          import pytest

          @pytest.mark.req("REQ-VERIFY-001")
          @pytest.mark.scope_unit
          def test_cross_lang_passing():
              assert True

          @pytest.mark.req("REQ-VERIFY-002")
          def test_cross_lang_also_passing():
              assert True
          PYEOF

      - name: Run Python tests with RTMX output
        run: pytest /tmp/test_cross.py --rtmx-output=/tmp/results.json -v

      - name: Validate JSON output
        run: python3 -m json.tool /tmp/results.json

      - name: Verify with Go CLI
        run: ./rtmx verify --results /tmp/results.json --dry-run --verbose

  release-dry-run:
    name: Release Dry Run
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --clean --skip=sign,publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify artifacts
        run: |
          echo "=== Release artifacts ==="
          ls -la dist/
          echo ""
          echo "=== Checksums ==="
          cat dist/checksums.txt
          echo ""
          echo "=== Verify expected files ==="
          test -f dist/checksums.txt || { echo "FAIL: missing checksums.txt"; exit 1; }
          ls dist/rtmx-go_*_linux_amd64.tar.gz || { echo "FAIL: missing linux amd64 archive"; exit 1; }
          ls dist/rtmx_*_linux_amd64.deb || { echo "FAIL: missing linux deb"; exit 1; }
          echo "All release artifacts verified."

  install-script-test:
    name: Install Script Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate script syntax
        run: bash -n scripts/install.sh

      - name: Test error handling
        run: |
          # Should fail gracefully for non-existent version
          RTMX_VERSION=v999.999.999 bash scripts/install.sh 2>&1 && exit 1 || true
          echo "Install script correctly fails for non-existent version"

  build-matrix:
    name: Build Matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o rtmx-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }} ./cmd/rtmx

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: rtmx-${{ matrix.goos }}-${{ matrix.goarch }}
          path: rtmx-${{ matrix.goos }}-${{ matrix.goarch }}*
