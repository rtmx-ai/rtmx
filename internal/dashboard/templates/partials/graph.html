<div class="space-y-4">
  <h2 class="text-2xl font-bold">Dependency Graph</h2>

  <div class="card">
    <div class="flex items-center gap-4 mb-4">
      <span class="text-sm text-gray-500">{{.NodeCount}} nodes, {{.EdgeCount}} edges, {{.WebCount}} webs</span>
      <select name="category" class="border rounded px-3 py-1.5 text-sm"
              hx-get="/partials/graph" hx-target="#content" hx-trigger="change">
        <option value="">All Categories</option>
        {{range .Categories}}
        <option value="{{.}}">{{.}}</option>
        {{end}}
      </select>
    </div>
    <div id="graph-container" style="width: 100%; height: 600px; border: 1px solid #e5e7eb; border-radius: 0.375rem;">
      <svg id="graph-svg" width="100%" height="100%"></svg>
    </div>
    <div class="mt-2 flex gap-4 text-xs text-gray-500">
      <span><span style="color: #16a34a;">&#9632;</span> Complete</span>
      <span><span style="color: #d97706;">&#9632;</span> Partial</span>
      <span><span style="color: #dc2626;">&#9632;</span> Missing</span>
      <span><span style="color: #71717a;">&#9632;</span> Not Started</span>
      <span>--- Critical Path</span>
    </div>
  </div>

  <script>
    (function() {
      var graphData = {{.GraphJSON}};
      if (typeof d3 !== 'undefined' && graphData) {
        renderGraph(graphData);
      }
    })();
  </script>
</div>
